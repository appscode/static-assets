version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "cron"
      cron: "0 */4 * * *"
      timezone: "UTC"
    open-pull-requests-limit: 0
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "cron"
      cron: "0 * * * *"
      timezone: "UTC"
    open-pull-requests-limit: 0
