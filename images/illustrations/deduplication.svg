<svg viewBox="0 0 500 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A file split into chunks where only the changed blobs, marked with a delta, are uploaded">
  <!-- soft background depth -->
  <defs>
    <radialGradient id="illGlowTR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E9DCFF" stop-opacity="0.85"/>
      <stop offset="20%" stop-color="#EBDFFF" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#EEE5FF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#F1EAFF" stop-opacity="0.3"/>
      <stop offset="80%" stop-color="#F4F0FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F5F0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="illGlowBL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DBC8FF" stop-opacity="0.75"/>
      <stop offset="20%" stop-color="#DFCEFF" stop-opacity="0.62"/>
      <stop offset="40%" stop-color="#E4D6FF" stop-opacity="0.44"/>
      <stop offset="60%" stop-color="#E9DEFF" stop-opacity="0.26"/>
      <stop offset="80%" stop-color="#EDE5FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#EDE5FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="illSoften" x="-100" y="-100" width="700" height="480" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <circle cx="424" cy="60" r="165" fill="url(#illGlowTR)" filter="url(#illSoften)"/>
  <circle cx="55" cy="248" r="135" fill="url(#illGlowBL)" filter="url(#illSoften)"/>
  <circle cx="472" cy="238" r="4" fill="#D9CCFF"/>
  <circle cx="26" cy="64" r="3" fill="#B899F7"/>

  <!-- ground shadow -->
  <ellipse cx="112" cy="188" rx="78" ry="10" fill="#1E0D42" opacity="0.05"/>

  <!-- the file, split into content-defined chunks: most unchanged (=), a few changed (Δ) -->
  <g>
    <!-- row 0 -->
    <rect x="55" y="90" width="24" height="24" rx="5" fill="#E4E2ED"/>
    <line x1="62" y1="100" x2="72" y2="100" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="62" y1="104" x2="72" y2="104" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>

    <rect x="85" y="90" width="24" height="24" rx="5" fill="#E4E2ED"/>
    <line x1="92" y1="100" x2="102" y2="100" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="92" y1="104" x2="102" y2="104" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>

    <rect x="115" y="90" width="24" height="24" rx="5" fill="#E4E2ED"/>
    <line x1="122" y1="100" x2="132" y2="100" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="122" y1="104" x2="132" y2="104" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>

    <rect x="145" y="90" width="24" height="24" rx="5" fill="#6633BB"/>
    <path d="M157 97l6 10h-12l6-10Z" stroke="#FFFFFF" stroke-width="1.6" fill="none" stroke-linejoin="round"/>

    <!-- row 1 -->
    <rect x="55" y="120" width="24" height="24" rx="5" fill="#E4E2ED"/>
    <line x1="62" y1="130" x2="72" y2="130" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="62" y1="134" x2="72" y2="134" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>

    <rect x="85" y="120" width="24" height="24" rx="5" fill="#6633BB"/>
    <path d="M97 127l6 10h-12l6-10Z" stroke="#FFFFFF" stroke-width="1.6" fill="none" stroke-linejoin="round"/>

    <rect x="115" y="120" width="24" height="24" rx="5" fill="#E4E2ED"/>
    <line x1="122" y1="130" x2="132" y2="130" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="122" y1="134" x2="132" y2="134" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>

    <rect x="145" y="120" width="24" height="24" rx="5" fill="#E4E2ED"/>
    <line x1="152" y1="130" x2="162" y2="130" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="152" y1="134" x2="162" y2="134" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>

    <!-- row 2 -->
    <rect x="55" y="150" width="24" height="24" rx="5" fill="#6633BB"/>
    <path d="M67 157l6 10h-12l6-10Z" stroke="#FFFFFF" stroke-width="1.6" fill="none" stroke-linejoin="round"/>

    <rect x="85" y="150" width="24" height="24" rx="5" fill="#E4E2ED"/>
    <line x1="92" y1="160" x2="102" y2="160" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="92" y1="164" x2="102" y2="164" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>

    <rect x="115" y="150" width="24" height="24" rx="5" fill="#E4E2ED"/>
    <line x1="122" y1="160" x2="132" y2="160" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="122" y1="164" x2="132" y2="164" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>

    <rect x="145" y="150" width="24" height="24" rx="5" fill="#E4E2ED"/>
    <line x1="152" y1="160" x2="162" y2="160" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="152" y1="164" x2="162" y2="164" stroke="#B4AFC7" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- diff scan badge -->
  <circle cx="38" cy="70" r="15" fill="#FFFFFF" stroke="#E4E2ED" stroke-width="1.5"/>
  <circle cx="35" cy="67" r="5" stroke="#6633BB" stroke-width="2" fill="none"/>
  <line x1="39" y1="71" x2="43" y2="75" stroke="#6633BB" stroke-width="2.2" stroke-linecap="round"/>

  <!-- flow: only the changed (Δ) chunks are uploaded -->
  <path d="M171 100Q280 70 350 95" stroke="#C4B5FD" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-dasharray="1 7"/>
  <path d="M111 130Q250 115 350 120" stroke="#C4B5FD" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-dasharray="1 7"/>
  <path d="M81 165Q250 190 350 148" stroke="#C4B5FD" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-dasharray="1 7"/>
  <path d="M343 113l9 7-6 10" stroke="#C4B5FD" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- destination: cloud storage, receiving the upload -->
  <g fill="#8355D6">
    <circle cx="366" cy="126" r="15"/>
    <circle cx="383" cy="115" r="19"/>
    <circle cx="400" cy="126" r="15"/>
    <rect x="364" y="122" width="40" height="24" rx="12"/>
  </g>
  <path d="M383 139v-15M377 130l6-6 6 6" stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- sparkle accents -->
  <path d="M445 55l1.4 4.6 4.6 1.4-4.6 1.4-1.4 4.6-1.4-4.6-4.6-1.4 4.6-1.4Z" fill="#C4B5FD"/>
  <path d="M25 225l1 3.2 3.2 1-3.2 1-1 3.2-1-3.2-3.2-1 3.2-1Z" fill="#D9CCFF"/>
</svg>
