  <circle cx="110" cy="211" r="15" fill="none" stroke="#3F73E4" stroke-width="4"/>
  <circle cx="110" cy="211" r="5.5" fill="#2A5FCF"/>

  <path d="M176 182 C214 168 236 164 262 168" fill="none" stroke="#E9930A" stroke-width="5" stroke-linecap="round"/>
  <polygon points="268,169 250,159 252,177" fill="#E9930A"/>
  <path d="M262 232 C236 240 214 244 178 240" fill="none" stroke="#2A5FCF" stroke-width="5" stroke-linecap="round"/>
  <polygon points="172,240 190,232 189,248" fill="#2A5FCF"/>
  <g transform="translate(220 200)"><circle r="16" fill="url(#keyGlow)"/><circle r="9" fill="none" stroke="url(#keyGrad)" stroke-width="4.5"/><rect x="7" y="-2.2" width="20" height="4.4" rx="2.2" fill="url(#keyGrad)"/></g>

