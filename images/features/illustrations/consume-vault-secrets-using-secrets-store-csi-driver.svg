<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" fill="none" role="img" aria-label="Consume KubeVault Secrets with CSI">
  <defs>
    <radialGradient id="kvGlowTR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CFE0FB" stop-opacity="0.9"/><stop offset="40%" stop-color="#DCE8FD" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#EAF1FE" stop-opacity="0.14"/><stop offset="100%" stop-color="#EAF1FE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kvGlowBL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BFD6FA" stop-opacity="0.85"/><stop offset="40%" stop-color="#D3E1FC" stop-opacity="0.45"/>
      <stop offset="75%" stop-color="#E6EFFE" stop-opacity="0.12"/><stop offset="100%" stop-color="#E6EFFE" stop-opacity="0"/>
    </radialGradient>
    <filter id="kvSoften" x="-120" y="-120" width="720" height="620" filterUnits="userSpaceOnUse"><feGaussianBlur stdDeviation="22"/></filter>
    <radialGradient id="spotWhite" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/><stop offset="62%" stop-color="#FFFFFF" stop-opacity="0.25"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vframe" x1="0.2" y1="0" x2="0.6" y2="1"><stop offset="0%" stop-color="#4C7CE8"/><stop offset="100%" stop-color="#173A82"/></linearGradient>
    <linearGradient id="vface" x1="0.15" y1="0" x2="0.55" y2="1"><stop offset="0%" stop-color="#6EA0F9"/><stop offset="50%" stop-color="#3F73E4"/><stop offset="100%" stop-color="#254FAC"/></linearGradient>
    <linearGradient id="vsheen" x1="0" y1="0" x2="0.8" y2="1"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/><stop offset="30%" stop-color="#FFFFFF" stop-opacity="0"/></linearGradient>
    <linearGradient id="vdoor" x1="0.1" y1="0" x2="0.4" y2="1"><stop offset="0%" stop-color="#CBDCF7"/><stop offset="34%" stop-color="#E9F1FE"/><stop offset="100%" stop-color="#FAFCFF"/></linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#EAF1FD"/></linearGradient>
    <linearGradient id="pod" x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#DCEAFE"/><stop offset="100%" stop-color="#BAD3FB"/></linearGradient>
    <radialGradient id="podGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#4C84F1" stop-opacity="0.4"/><stop offset="100%" stop-color="#4C84F1" stop-opacity="0"/></radialGradient>
    <linearGradient id="keyGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFD463"/><stop offset="100%" stop-color="#E39A00"/></linearGradient>
    <radialGradient id="keyGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FBC63F" stop-opacity="0.75"/><stop offset="100%" stop-color="#FBC63F" stop-opacity="0"/></radialGradient>
    <filter id="dropBig" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#14337A" flood-opacity="0.34"/></filter>
    <filter id="dropSm" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#14337A" flood-opacity="0.3"/></filter>
    <filter id="blurS" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <circle cx="402" cy="46" r="188" fill="url(#kvGlowTR)" filter="url(#kvSoften)"/>
  <circle cx="52" cy="322" r="150" fill="url(#kvGlowBL)" filter="url(#kvSoften)"/>
  <circle cx="420" cy="300" r="4" fill="#BFD6FA"/><circle cx="34" cy="66" r="3" fill="#8FB4F2"/>
  <ellipse cx="230" cy="196" rx="180" ry="146" fill="url(#spotWhite)"/>

  <!-- compact vault (beveled) left -->
  <ellipse cx="106" cy="276" rx="58" ry="11" fill="#1A3E92" opacity="0.20" filter="url(#blurS)"/>
  <g filter="url(#dropBig)">
    <rect x="58" y="262" width="14" height="12" rx="3" fill="#12306E"/><rect x="140" y="262" width="14" height="12" rx="3" fill="#12306E"/>
    <rect x="48" y="150" width="116" height="118" rx="17" fill="url(#vframe)"/>
    <rect x="55" y="157" width="102" height="104" rx="12" fill="url(#vface)"/>
    <rect x="55" y="157" width="102" height="104" rx="12" fill="url(#vsheen)"/>
  </g>
  <rect x="66" y="167" width="80" height="84" rx="9" fill="url(#vdoor)" filter="url(#dropSm)"/>
  <circle cx="106" cy="209" r="23" fill="#F3F8FF" stroke="#B7CCEE" stroke-width="2"/>
  <circle cx="106" cy="209" r="15" fill="none" stroke="#3F73E4" stroke-width="4"/>
  <path d="M93 197 A16 16 0 0 1 121 199" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="106" cy="209" r="5.5" fill="#2A5FCF"/>

  <!-- CSI driver chip (center) -->
  <g transform="translate(230 182)">
    <g filter="url(#dropSm)"><rect x="-36" y="-32" width="72" height="64" rx="14" fill="url(#chip)"/></g>
    <rect x="-35.5" y="-31.5" width="71" height="63" rx="13.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="1"/>
    <rect x="-22" y="-18" width="44" height="36" rx="8" fill="#DCE9FD"/>
    <text x="0" y="7" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="800" fill="#2A5FCF" text-anchor="middle">CSI</text>
    <g fill="#8FB3EC">
      <rect x="-43" y="-20" width="9" height="5" rx="2"/><rect x="-43" y="-3" width="9" height="5" rx="2"/><rect x="-43" y="14" width="9" height="5" rx="2"/>
      <rect x="34" y="-20" width="9" height="5" rx="2"/><rect x="34" y="-3" width="9" height="5" rx="2"/><rect x="34" y="14" width="9" height="5" rx="2"/>
    </g>
  </g>

  <!-- k8s pod (right) -->
  <g transform="translate(374 182)">
    <polygon points="0,-56 48,-28 48,28 0,56 -48,28 -48,-28" fill="url(#podGlow)"/>
    <g filter="url(#dropSm)"><polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" fill="url(#pod)"/></g>
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" fill="none" stroke="#4C84F1" stroke-width="2.5"/>
    <circle r="19" fill="none" stroke="#2A5FCF" stroke-width="3"/>
    <g stroke="#2A5FCF" stroke-width="3" stroke-linecap="round"><line x1="0" y1="-19" x2="0" y2="-31"/><line x1="16" y1="10" x2="28" y2="17"/><line x1="-16" y1="10" x2="-28" y2="17"/></g>
    <circle r="5" fill="#2A5FCF"/>
  </g>

  <!-- dotted path + travelling glowing key -->
  <path d="M158 205 C182 200 194 192 202 186" stroke="#9DBBF0" stroke-width="2.6" stroke-dasharray="1 8" stroke-linecap="round"/>
  <path d="M266 178 C300 172 316 176 328 180" stroke="#9DBBF0" stroke-width="2.6" stroke-dasharray="1 8" stroke-linecap="round"/>
  <g transform="translate(300 168)">
    <circle cx="6" cy="0" r="15" fill="url(#keyGlow)"/>
    <circle cx="0" cy="0" r="9" fill="none" stroke="url(#keyGrad)" stroke-width="5"/>
    <rect x="8" y="-2.5" width="30" height="5" rx="2.5" fill="url(#keyGrad)"/>
    <rect x="30" y="2.5" width="5" height="8" rx="1.5" fill="url(#keyGrad)"/>
  </g>
  <g fill="#7FB0F5"><circle cx="230" cy="120" r="2.4"/><circle cx="150" cy="112" r="2"/></g>
</svg>
