<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" fill="none" role="img" aria-label="Cloud Storage Backend">
  <defs>
    <radialGradient id="kvGlowTR" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#CFE0FB" stop-opacity="0.9"/><stop offset="40%" stop-color="#DCE8FD" stop-opacity="0.5"/><stop offset="75%" stop-color="#EAF1FE" stop-opacity="0.14"/><stop offset="100%" stop-color="#EAF1FE" stop-opacity="0"/></radialGradient>
    <radialGradient id="kvGlowBL" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#BFD6FA" stop-opacity="0.85"/><stop offset="40%" stop-color="#D3E1FC" stop-opacity="0.45"/><stop offset="75%" stop-color="#E6EFFE" stop-opacity="0.12"/><stop offset="100%" stop-color="#E6EFFE" stop-opacity="0"/></radialGradient>
    <filter id="kvSoften" x="-120" y="-120" width="720" height="620" filterUnits="userSpaceOnUse"><feGaussianBlur stdDeviation="22"/></filter>
    <radialGradient id="spotWhite" cx="50%" cy="46%" r="55%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/><stop offset="62%" stop-color="#FFFFFF" stop-opacity="0.25"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
    <linearGradient id="vframe" x1="0.2" y1="0" x2="0.6" y2="1"><stop offset="0%" stop-color="#4C7CE8"/><stop offset="100%" stop-color="#173A82"/></linearGradient>
    <linearGradient id="vface" x1="0.15" y1="0" x2="0.55" y2="1"><stop offset="0%" stop-color="#6EA0F9"/><stop offset="50%" stop-color="#3F73E4"/><stop offset="100%" stop-color="#254FAC"/></linearGradient>
    <linearGradient id="vsheen" x1="0" y1="0" x2="0.8" y2="1"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/><stop offset="30%" stop-color="#FFFFFF" stop-opacity="0"/></linearGradient>
    <linearGradient id="vdoor" x1="0.1" y1="0" x2="0.4" y2="1"><stop offset="0%" stop-color="#CBDCF7"/><stop offset="34%" stop-color="#E9F1FE"/><stop offset="100%" stop-color="#FAFCFF"/></linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#EDF3FD"/></linearGradient>
    <linearGradient id="awsC" x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#FFB44D"/><stop offset="100%" stop-color="#EC7A08"/></linearGradient>
    <linearGradient id="azC" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0%" stop-color="#3BC8F5"/><stop offset="100%" stop-color="#0F5FB8"/></linearGradient>
    <filter id="dropBig" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#14337A" flood-opacity="0.32"/></filter>
    <filter id="dropSm" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#14337A" flood-opacity="0.26"/></filter>
  </defs>
  <circle cx="402" cy="46" r="188" fill="url(#kvGlowTR)" filter="url(#kvSoften)"/>
  <circle cx="52" cy="322" r="150" fill="url(#kvGlowBL)" filter="url(#kvSoften)"/>
  <circle cx="420" cy="300" r="4" fill="#BFD6FA"/><circle cx="34" cy="66" r="3" fill="#8FB4F2"/>
  <ellipse cx="228" cy="196" rx="184" ry="148" fill="url(#spotWhite)"/>

  <ellipse cx="112" cy="276" rx="60" ry="11" fill="#1A3E92" opacity="0.20"/>
  <g filter="url(#dropBig)">
    <rect x="64" y="262" width="14" height="12" rx="3" fill="#12306E"/><rect x="146" y="262" width="14" height="12" rx="3" fill="#12306E"/>
    <rect x="54" y="150" width="116" height="118" rx="17" fill="url(#vframe)"/>
    <rect x="61" y="157" width="102" height="104" rx="12" fill="url(#vface)"/>
    <rect x="61" y="157" width="102" height="104" rx="12" fill="url(#vsheen)"/>
  </g>
  <rect x="72" y="167" width="80" height="84" rx="9" fill="url(#vdoor)" filter="url(#dropSm)"/>
  <circle cx="112" cy="209" r="23" fill="#F3F8FF" stroke="#B7CCEE" stroke-width="2"/>
  <circle cx="112" cy="209" r="15" fill="none" stroke="#3F73E4" stroke-width="4"/>
  <circle cx="112" cy="209" r="5.5" fill="#2A5FCF"/>

  <g stroke="#9DBBF0" stroke-width="2.6" stroke-dasharray="1 7" stroke-linecap="round" fill="none">
    <path d="M170 190 C214 168 250 152 290 148"/><path d="M170 208 C220 208 250 208 290 208"/><path d="M170 226 C214 246 250 260 290 266"/>
  </g>

  <!-- 3 cloud storage provider chips (AWS S3 / Azure Blob / GCS) -->
  <g transform="translate(330 148)">
    <g filter="url(#dropSm)"><rect x="-36" y="-26" width="132" height="52" rx="16" fill="url(#tile)"/></g>
    <g transform="translate(-4 0)"><path d="M-16 8 a9 9 0 0 1 1 -17 a12 12 0 0 1 23 3 a8 8 0 0 1 -1 15 Z" fill="url(#awsC)"/></g>
    <text x="30" y="5" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="700" fill="#232F3E" text-anchor="middle">S3</text>
  </g>
  <g transform="translate(330 208)">
    <g filter="url(#dropSm)"><rect x="-36" y="-26" width="132" height="52" rx="16" fill="url(#tile)"/></g>
    <g transform="translate(-16 0) scale(1.15) translate(-12 -12)"><path d="M5.483 21.3H24L14.025 4.013l-3.038 8.347 5.836 6.938L5.483 21.3zM13.23 2.7L6.105 8.677 0 19.253h5.505v.014L13.23 2.7z" fill="url(#azC)"/></g>
    <text x="30" y="5" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="700" fill="#0E78D4" text-anchor="middle">Blob</text>
  </g>
  <g transform="translate(330 268)">
    <g filter="url(#dropSm)"><rect x="-36" y="-26" width="132" height="52" rx="16" fill="url(#tile)"/></g>
    <g transform="translate(-14 0)">
      <clipPath id="gcsClip"><path d="M-13 8 a9 9 0 0 1 -1 -17 a12 12 0 0 1 23 -3 a8 8 0 0 1 14 4 a8 8 0 0 1 -3 16 Z"/></clipPath>
      <g clip-path="url(#gcsClip)"><rect x="-24" y="-18" width="20" height="18" fill="#EA4335"/><rect x="-4" y="-18" width="20" height="18" fill="#FBBC05"/><rect x="-4" y="0" width="20" height="18" fill="#34A853"/><rect x="-24" y="0" width="20" height="18" fill="#4285F4"/></g>
    </g>
    <text x="30" y="5" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="700" fill="#4285F4" text-anchor="middle">GCS</text>
  </g>
  <g fill="#7FB0F5"><circle cx="228" cy="118" r="2.4"/><circle cx="230" cy="300" r="2"/></g>
</svg>
