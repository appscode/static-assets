    <rect x="-26" y="9" width="80" height="8" rx="4" fill="#DDE9FD"/>
    <g transform="translate(-44 42)"><circle r="9" fill="#22C55E"/><path d="M-4 0 l3 3 l6 -6" stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
