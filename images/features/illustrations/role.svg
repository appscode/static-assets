    <ellipse cx="0" cy="10" rx="66" ry="60" fill="url(#badgeGlow)"/>
    <g filter="url(#dropBig)"><path d="M0 -58 L48 -36 V10 C48 42 28 62 0 72 C-28 62 -48 42 -48 10 V-36 Z" fill="url(#badge)"/></g>
    <path d="M0 -58 L48 -36 V10 C48 42 28 62 0 72 C-28 62 -48 42 -48 10 V-36 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1.5"/>
