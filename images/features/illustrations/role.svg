    <path d="M-18 24 a18 16 0 0 1 36 0 Z" fill="#FFFFFF"/>
  </g>

  <!-- permission list card (right) -->
  <path d="M226 196 C256 194 276 194 300 196" stroke="#9DBBF0" stroke-width="2.6" stroke-dasharray="1 8" stroke-linecap="round" fill="none"/>
  <g transform="translate(346 196)">
