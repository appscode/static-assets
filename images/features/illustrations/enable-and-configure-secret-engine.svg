<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" fill="none" role="img" aria-label="Enable and Configure Secret Engine">
  <defs>
    <radialGradient id="kvGlowTR" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#CFE0FB" stop-opacity="0.9"/><stop offset="40%" stop-color="#DCE8FD" stop-opacity="0.5"/><stop offset="75%" stop-color="#EAF1FE" stop-opacity="0.14"/><stop offset="100%" stop-color="#EAF1FE" stop-opacity="0"/></radialGradient>
    <radialGradient id="kvGlowBL" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#BFD6FA" stop-opacity="0.85"/><stop offset="40%" stop-color="#D3E1FC" stop-opacity="0.45"/><stop offset="75%" stop-color="#E6EFFE" stop-opacity="0.12"/><stop offset="100%" stop-color="#E6EFFE" stop-opacity="0"/></radialGradient>
    <filter id="kvSoften" x="-120" y="-120" width="720" height="620" filterUnits="userSpaceOnUse"><feGaussianBlur stdDeviation="22"/></filter>
    <radialGradient id="spotWhite" cx="50%" cy="46%" r="55%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/><stop offset="62%" stop-color="#FFFFFF" stop-opacity="0.25"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
    <linearGradient id="panel" x1="0.15" y1="0" x2="0.55" y2="1"><stop offset="0%" stop-color="#6EA0F9"/><stop offset="50%" stop-color="#3F73E4"/><stop offset="100%" stop-color="#254FAC"/></linearGradient>
    <linearGradient id="panelSheen" x1="0" y1="0" x2="0.8" y2="1"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/><stop offset="30%" stop-color="#FFFFFF" stop-opacity="0"/></linearGradient>
    <linearGradient id="cardG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#EDF3FD"/></linearGradient>
    <radialGradient id="grnGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#22C55E" stop-opacity="0.45"/><stop offset="100%" stop-color="#22C55E" stop-opacity="0"/></radialGradient>
    <filter id="dropBig" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#14337A" flood-opacity="0.30"/></filter>
    <filter id="dropSm" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#14337A" flood-opacity="0.26"/></filter>
  </defs>
  <circle cx="402" cy="46" r="188" fill="url(#kvGlowTR)" filter="url(#kvSoften)"/>
  <circle cx="52" cy="322" r="150" fill="url(#kvGlowBL)" filter="url(#kvSoften)"/>
  <circle cx="420" cy="300" r="4" fill="#BFD6FA"/><circle cx="34" cy="66" r="3" fill="#8FB4F2"/>
  <ellipse cx="230" cy="192" rx="184" ry="148" fill="url(#spotWhite)"/>

  <!-- secret engine module panel -->
  <ellipse cx="230" cy="298" rx="120" ry="14" fill="#1A3E92" opacity="0.16"/>
  <g filter="url(#dropBig)"><rect x="110" y="130" width="240" height="160" rx="20" fill="url(#panel)"/></g>
  <rect x="110" y="130" width="240" height="160" rx="20" fill="url(#panelSheen)"/>
  <rect x="110.5" y="130.5" width="239" height="159" rx="19.5" fill="none" stroke="#8FB4F5" stroke-opacity="0.5" stroke-width="1"/>

  <!-- gear icon top-left of panel -->
  <g transform="translate(150 165)">
    <circle r="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.85" stroke-width="3"/>
    <g stroke="#FFFFFF" stroke-opacity="0.85" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-16" x2="0" y2="-22"/><line x1="0" y1="16" x2="0" y2="22"/><line x1="-16" y1="0" x2="-22" y2="0"/><line x1="16" y1="0" x2="22" y2="0"/>
      <line x1="-11.3" y1="-11.3" x2="-15.6" y2="-15.6"/><line x1="11.3" y1="11.3" x2="15.6" y2="15.6"/><line x1="-11.3" y1="11.3" x2="-15.6" y2="15.6"/><line x1="11.3" y1="-11.3" x2="15.6" y2="-15.6"/>
    </g>
    <circle r="5" fill="#FFFFFF"/>
  </g>

  <!-- config sliders -->
  <g transform="translate(150 220)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="4" stroke-linecap="round"/>
    <circle cx="38" cy="0" r="7" fill="#FFFFFF"/>
  </g>
  <g transform="translate(150 240)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="4" stroke-linecap="round"/>
    <circle cx="20" cy="0" r="7" fill="#FFFFFF"/>
  </g>

  <!-- toggle switch (ON, green) -->
  <g transform="translate(258 165)">
    <circle r="24" fill="url(#grnGlow)"/>
    <g filter="url(#dropSm)"><rect x="-24" y="-13" width="48" height="26" rx="13" fill="#22C55E"/></g>
    <circle cx="10" cy="0" r="10" fill="#FFFFFF"/>
  </g>
  <text x="258" y="200" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle" opacity="0.9">ENABLED</text>

  <!-- CRD status card -->
  <g transform="translate(258 250)">
    <g filter="url(#dropSm)"><rect x="-60" y="-16" width="120" height="34" rx="17" fill="url(#cardG)"/></g>
    <circle cx="-42" cy="1" r="6" fill="#22C55E"/>
    <text x="4" y="6" font-family="'DejaVu Sans Mono','Courier New',monospace" font-size="12" font-weight="700" fill="#254FAC" text-anchor="middle">SecretEngine</text>
  </g>
  <g fill="#7FB0F5"><circle cx="230" cy="110" r="2.4"/><circle cx="230" cy="320" r="2"/></g>
</svg>
