<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" fill="none" role="img" aria-label="Secret Role Binding">
  <defs>
    <radialGradient id="kvGlowTR" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#CFE0FB" stop-opacity="0.9"/><stop offset="40%" stop-color="#DCE8FD" stop-opacity="0.5"/><stop offset="75%" stop-color="#EAF1FE" stop-opacity="0.14"/><stop offset="100%" stop-color="#EAF1FE" stop-opacity="0"/></radialGradient>
    <radialGradient id="kvGlowBL" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#BFD6FA" stop-opacity="0.85"/><stop offset="40%" stop-color="#D3E1FC" stop-opacity="0.45"/><stop offset="75%" stop-color="#E6EFFE" stop-opacity="0.12"/><stop offset="100%" stop-color="#E6EFFE" stop-opacity="0"/></radialGradient>
    <filter id="kvSoften" x="-120" y="-120" width="720" height="620" filterUnits="userSpaceOnUse"><feGaussianBlur stdDeviation="22"/></filter>
    <radialGradient id="spotWhite" cx="50%" cy="46%" r="55%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/><stop offset="62%" stop-color="#FFFFFF" stop-opacity="0.24"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
    <linearGradient id="badge" x1="0.2" y1="0" x2="0.6" y2="1"><stop offset="0%" stop-color="#6EA0F9"/><stop offset="100%" stop-color="#254FAC"/></linearGradient>
    <linearGradient id="gear" x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#6EA0F9"/><stop offset="100%" stop-color="#254FAC"/></linearGradient>
    <radialGradient id="gearGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#4C84F1" stop-opacity="0.4"/><stop offset="100%" stop-color="#4C84F1" stop-opacity="0"/></radialGradient>
    <linearGradient id="avatar" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8FB3EC"/><stop offset="100%" stop-color="#6E92D8"/></linearGradient>
    <filter id="dropBig" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#14337A" flood-opacity="0.28"/></filter>
    <filter id="dropSm" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#14337A" flood-opacity="0.24"/></filter>
  </defs>
  <circle cx="402" cy="46" r="188" fill="url(#kvGlowTR)" filter="url(#kvSoften)"/>
  <circle cx="52" cy="322" r="150" fill="url(#kvGlowBL)" filter="url(#kvSoften)"/>
  <circle cx="420" cy="300" r="4" fill="#BFD6FA"/><circle cx="34" cy="66" r="3" fill="#8FB4F2"/>
  <ellipse cx="230" cy="192" rx="188" ry="150" fill="url(#spotWhite)"/>

  <!-- role tag (far left) -->
  <g transform="translate(96 200)" filter="url(#dropBig)">
    <path d="M-40 -10 h56 l24 24 l-24 24 h-56 a10 10 0 0 1 -10 -10 v-28 a10 10 0 0 1 10 -10 Z" fill="url(#badge)"/>
  </g>
  <circle cx="66" cy="200" r="6" fill="#FFFFFF"/>
  <text x="102" y="205" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Role</text>

  <!-- binding arrow -->
  <path d="M172 200 h38" stroke="#9DBBF0" stroke-width="2.6" stroke-dasharray="1 8" stroke-linecap="round"/>

  <!-- gear (binding engine) -->
  <g transform="translate(252 178)">
    <circle r="34" fill="url(#gearGlow)"/>
    <g filter="url(#dropSm)">
      <g fill="url(#gear)">
        <circle r="26"/>
        <g><rect x="-5" y="-36" width="10" height="11" rx="2"/><rect x="-5" y="25" width="10" height="11" rx="2"/>
          <rect x="-36" y="-5" width="11" height="10" rx="2"/><rect x="25" y="-5" width="11" height="10" rx="2"/>
          <rect x="-5" y="-36" width="10" height="11" rx="2" transform="rotate(45)"/><rect x="-5" y="25" width="10" height="11" rx="2" transform="rotate(45)"/>
          <rect x="-36" y="-5" width="11" height="10" rx="2" transform="rotate(45)"/><rect x="25" y="-5" width="11" height="10" rx="2" transform="rotate(45)"/>
        </g>
      </g>
    </g>
    <circle r="12" fill="#FFFFFF"/>
    <path d="M-3 -6 l7 6 l-7 6 Z" fill="#254FAC" transform="translate(1 0)"/>
  </g>

  <!-- three user avatars, bound via dotted lines -->
  <g stroke="#9DBBF0" stroke-width="2.4" stroke-dasharray="1 7" stroke-linecap="round">
    <path d="M240 208 C220 238 190 260 168 274"/>
    <path d="M252 214 v52"/>
    <path d="M264 208 C284 238 314 260 336 274"/>
  </g>
  <g filter="url(#dropSm)">
    <circle cx="160" cy="294" r="24" fill="#FFFFFF"/><circle cx="252" cy="302" r="24" fill="#FFFFFF"/><circle cx="344" cy="294" r="24" fill="#FFFFFF"/>
  </g>
  <g transform="translate(160 294)"><circle cy="-6" r="8" fill="url(#avatar)"/><path d="M-13 15 a13 12 0 0 1 26 0 Z" fill="url(#avatar)"/></g>
  <g transform="translate(252 302)"><circle cy="-6" r="8" fill="url(#avatar)"/><path d="M-13 15 a13 12 0 0 1 26 0 Z" fill="url(#avatar)"/></g>
  <g transform="translate(344 294)"><circle cy="-6" r="8" fill="url(#avatar)"/><path d="M-13 15 a13 12 0 0 1 26 0 Z" fill="url(#avatar)"/></g>
  <g fill="#7FB0F5"><circle cx="230" cy="100" r="2.4"/><circle cx="120" cy="120" r="2"/></g>
</svg>
