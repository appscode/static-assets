<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" fill="none" role="img" aria-label="Manage DB Users Privileges using SecretRoleBinding">
  <defs>
    <radialGradient id="kvGlowTR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CFE0FB" stop-opacity="0.9"/><stop offset="40%" stop-color="#DCE8FD" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#EAF1FE" stop-opacity="0.14"/><stop offset="100%" stop-color="#EAF1FE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kvGlowBL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BFD6FA" stop-opacity="0.85"/><stop offset="40%" stop-color="#D3E1FC" stop-opacity="0.45"/>
      <stop offset="75%" stop-color="#E6EFFE" stop-opacity="0.12"/><stop offset="100%" stop-color="#E6EFFE" stop-opacity="0"/>
    </radialGradient>
    <filter id="kvSoften" x="-120" y="-120" width="720" height="620" filterUnits="userSpaceOnUse"><feGaussianBlur stdDeviation="22"/></filter>
    <radialGradient id="spotWhite" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/><stop offset="62%" stop-color="#FFFFFF" stop-opacity="0.24"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyl" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2A5FCF"/><stop offset="42%" stop-color="#5488F3"/><stop offset="100%" stop-color="#2149A8"/></linearGradient>
    <linearGradient id="cylTop" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6EA0F9"/><stop offset="100%" stop-color="#8FB6FA"/></linearGradient>
    <linearGradient id="folder" x1="0.2" y1="0" x2="0.6" y2="1"><stop offset="0%" stop-color="#8FB3EC"/><stop offset="100%" stop-color="#5C86D6"/></linearGradient>
    <linearGradient id="gear" x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#6EA0F9"/><stop offset="100%" stop-color="#254FAC"/></linearGradient>
    <radialGradient id="gearGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#4C84F1" stop-opacity="0.4"/><stop offset="100%" stop-color="#4C84F1" stop-opacity="0"/></radialGradient>
    <linearGradient id="avatar" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8FB3EC"/><stop offset="100%" stop-color="#6E92D8"/></linearGradient>
    <filter id="dropBig" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#14337A" flood-opacity="0.28"/></filter>
    <filter id="dropSm" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#14337A" flood-opacity="0.24"/></filter>
  </defs>

  <circle cx="402" cy="46" r="188" fill="url(#kvGlowTR)" filter="url(#kvSoften)"/>
  <circle cx="52" cy="322" r="150" fill="url(#kvGlowBL)" filter="url(#kvSoften)"/>
  <circle cx="420" cy="300" r="4" fill="#BFD6FA"/><circle cx="34" cy="66" r="3" fill="#8FB4F2"/>
  <ellipse cx="230" cy="192" rx="188" ry="150" fill="url(#spotWhite)"/>

  <!-- database cylinder (3D) far left -->
  <g filter="url(#dropBig)">
    <ellipse cx="70" cy="270" rx="38" ry="10" fill="#1A3E92" opacity="0.16"/>
    <path d="M36 158 v92 a34 12 0 0 0 68 0 v-92 Z" fill="url(#cyl)"/>
    <ellipse cx="70" cy="222" rx="34" ry="12" fill="#2149A8"/>
    <ellipse cx="70" cy="184" rx="34" ry="12" fill="#2149A8"/>
    <ellipse cx="70" cy="158" rx="34" ry="12" fill="url(#cylTop)"/>
  </g>

  <!-- role folders (three, connected from DB) -->
  <g filter="url(#dropSm)">
    <path d="M132 150 h34 l8 8 h30 v22 h-72 Z" fill="url(#folder)"/>
    <path d="M132 202 h34 l8 8 h30 v22 h-72 Z" fill="url(#folder)"/>
    <path d="M132 254 h34 l8 8 h30 v22 h-72 Z" fill="url(#folder)"/>
  </g>
  <g stroke="#9DBBF0" stroke-width="2.4" fill="none">
    <path d="M104 176 h14 v-8 h14"/><path d="M104 200 h28"/><path d="M104 224 h14 v8 h14"/>
  </g>
  <circle cx="104" cy="200" r="4" fill="#2A5FCF"/>

  <!-- binding arrow -->
  <path d="M212 200 h38" stroke="#9DBBF0" stroke-width="2.6" stroke-dasharray="1 8" stroke-linecap="round"/>

  <!-- gear (binding engine) -->
  <g transform="translate(292 172)">
    <circle r="34" fill="url(#gearGlow)"/>
    <g filter="url(#dropSm)">
      <g fill="url(#gear)">
        <circle r="26"/>
        <g><rect x="-5" y="-36" width="10" height="11" rx="2"/><rect x="-5" y="25" width="10" height="11" rx="2"/>
          <rect x="-36" y="-5" width="11" height="10" rx="2"/><rect x="25" y="-5" width="11" height="10" rx="2"/>
          <rect x="-5" y="-36" width="10" height="11" rx="2" transform="rotate(45)"/><rect x="-5" y="25" width="10" height="11" rx="2" transform="rotate(45)"/>
          <rect x="-36" y="-5" width="11" height="10" rx="2" transform="rotate(45)"/><rect x="25" y="-5" width="11" height="10" rx="2" transform="rotate(45)"/>
        </g>
      </g>
    </g>
    <circle r="12" fill="#FFFFFF"/>
    <path d="M-3 -6 l7 6 l-7 6 Z" fill="#254FAC" transform="translate(1 0)"/>
  </g>

  <!-- three user avatars, bound via dotted lines -->
  <g stroke="#9DBBF0" stroke-width="2.4" stroke-dasharray="1 7" stroke-linecap="round">
    <path d="M280 202 C260 232 230 254 208 268"/>
    <path d="M292 208 v52"/>
    <path d="M304 202 C324 232 354 254 376 268"/>
  </g>
  <g filter="url(#dropSm)">
    <g transform="translate(200 288)"><circle r="24" fill="#FFFFFF"/></g>
    <g transform="translate(292 296)"><circle r="24" fill="#FFFFFF"/></g>
    <g transform="translate(384 288)"><circle r="24" fill="#FFFFFF"/></g>
  </g>
  <g transform="translate(200 288)"><circle cy="-6" r="8" fill="url(#avatar)"/><path d="M-13 15 a13 12 0 0 1 26 0 Z" fill="url(#avatar)"/></g>
  <g transform="translate(292 296)"><circle cy="-6" r="8" fill="url(#avatar)"/><path d="M-13 15 a13 12 0 0 1 26 0 Z" fill="url(#avatar)"/></g>
  <g transform="translate(384 288)"><circle cy="-6" r="8" fill="url(#avatar)"/><path d="M-13 15 a13 12 0 0 1 26 0 Z" fill="url(#avatar)"/></g>
  <g fill="#7FB0F5"><circle cx="230" cy="110" r="2.4"/><circle cx="140" cy="120" r="2"/></g>
</svg>
