<svg viewBox="0 0 500 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A declarative backup spec being reconciled into a target database, a schedule, and a storage backend">
  <!-- soft background depth -->
  <defs>
    <radialGradient id="illGlowTR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E9DCFF" stop-opacity="0.85"/>
      <stop offset="20%" stop-color="#EBDFFF" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#EEE5FF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#F1EAFF" stop-opacity="0.3"/>
      <stop offset="80%" stop-color="#F4F0FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F5F0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="illGlowBL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DBC8FF" stop-opacity="0.75"/>
      <stop offset="20%" stop-color="#DFCEFF" stop-opacity="0.62"/>
      <stop offset="40%" stop-color="#E4D6FF" stop-opacity="0.44"/>
      <stop offset="60%" stop-color="#E9DEFF" stop-opacity="0.26"/>
      <stop offset="80%" stop-color="#EDE5FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#EDE5FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="illSoften" x="-100" y="-100" width="700" height="480" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <circle cx="424" cy="60" r="165" fill="url(#illGlowTR)" filter="url(#illSoften)"/>
  <circle cx="55" cy="248" r="135" fill="url(#illGlowBL)" filter="url(#illSoften)"/>
  <circle cx="472" cy="238" r="4" fill="#D9CCFF"/>
  <circle cx="26" cy="64" r="3" fill="#B899F7"/>

  <!-- ground shadow -->
  <ellipse cx="178" cy="246" rx="92" ry="13" fill="#1E0D42" opacity="0.05"/>

  <!-- declared spec: a tilted document, abstracted (no literal text) -->
  <g transform="rotate(-8 175 140)">
    <!-- shadow -->
    <rect x="99" y="49" width="160" height="190" rx="16" fill="#1E0D42" opacity="0.07"/>
    <!-- bookmark ribbon -->
    <path d="M130 30h20v35l-10-8-10 8Z" fill="#6633BB"/>
    <!-- page -->
    <rect x="95" y="45" width="160" height="190" rx="16" fill="#FFFFFF" stroke="#E4E2ED" stroke-width="1.5"/>

    <!-- abstract spec lines: chip (key) + bar (value) pairs -->
    <g>
      <rect x="115" y="88" width="30" height="8" rx="4" fill="#8B5CF6"/>
      <rect x="150" y="88" width="70" height="8" rx="4" fill="#E4E2ED"/>

      <rect x="115" y="106" width="24" height="8" rx="4" fill="#8B5CF6"/>
      <rect x="144" y="106" width="90" height="8" rx="4" fill="#E4E2ED"/>

      <rect x="115" y="124" width="34" height="8" rx="4" fill="#8B5CF6"/>
      <rect x="154" y="124" width="55" height="8" rx="4" fill="#E4E2ED"/>

      <rect x="115" y="142" width="22" height="8" rx="4" fill="#8B5CF6"/>
      <rect x="142" y="142" width="85" height="8" rx="4" fill="#E4E2ED"/>

      <rect x="115" y="160" width="28" height="8" rx="4" fill="#8B5CF6"/>
      <rect x="148" y="160" width="65" height="8" rx="4" fill="#E4E2ED"/>

      <rect x="115" y="178" width="30" height="8" rx="4" fill="#8B5CF6"/>
      <rect x="150" y="178" width="76" height="8" rx="4" fill="#E4E2ED"/>
    </g>

    <!-- applied/valid badge -->
    <circle cx="235" cy="216" r="17" fill="#6633BB"/>
    <path d="M227 216.5l5.5 5.5L244 210" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- flow: the spec is applied toward the cluster -->
  <path d="M259 124 Q305 96 358 132" stroke="#C4B5FD" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="1 7"/>
  <path d="M351 124l10 8-8 10" stroke="#C4B5FD" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- reconciliation pulse ring -->
  <circle cx="390" cy="150" r="40" stroke="#C4B5FD" stroke-width="1.5" stroke-dasharray="3 6" opacity="0.55"/>

  <!-- cluster: controller hub reconciling into running workload nodes -->
  <line x1="390" y1="150" x2="345" y2="95" stroke="#C4B5FD" stroke-width="2"/>
  <line x1="390" y1="150" x2="452" y2="95" stroke="#C4B5FD" stroke-width="2"/>
  <line x1="390" y1="150" x2="400" y2="225" stroke="#C4B5FD" stroke-width="2"/>

  <!-- target: database -->
  <path d="M345 78L359.7 86.5V103.5L345 112L330.3 103.5V86.5Z" fill="#8355D6"/>
  <g stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="345" cy="90" rx="6.5" ry="2.4"/>
    <path d="M338.5 90v10a6.5 2.4 0 0 0 13 0V90"/>
    <path d="M338.5 95a6.5 2.4 0 0 0 13 0"/>
  </g>

  <!-- behavior: schedule -->
  <path d="M452 78L466.7 86.5V103.5L452 112L437.3 103.5V86.5Z" fill="#A78BFA"/>
  <g stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="452" cy="95" r="8"/>
    <path d="M452 90.5v4.5l3.5 2"/>
  </g>

  <!-- behavior: storage backend -->
  <path d="M400 208L414.7 216.5V233.5L400 242L385.3 233.5V216.5Z" fill="#C4B5FD"/>
  <g fill="#FFFFFF">
    <circle cx="393.5" cy="227" r="4.1"/>
    <circle cx="400" cy="223.3" r="5.1"/>
    <circle cx="406.5" cy="227" r="4.1"/>
    <rect x="392.5" y="225.5" width="15" height="6" rx="3"/>
  </g>

  <!-- controller hub: reconciled -->
  <path d="M390 120L416 135V165L390 180L364 165V135Z" fill="#6633BB"/>
  <path d="M379 150l7 7 14-15" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- sparkle accents -->
  <path d="M471 62l1.4 4.6 4.6 1.4-4.6 1.4-1.4 4.6-1.4-4.6-4.6-1.4 4.6-1.4Z" fill="#C4B5FD"/>
  <path d="M104 52l1 3.2 3.2 1-3.2 1-1 3.2-1-3.2-3.2-1 3.2-1Z" fill="#D9CCFF"/>
</svg>
