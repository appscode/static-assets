<svg viewBox="0 0 500 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A database's tables and schemas exported as a portable file that moves to another environment">
  <!-- soft background depth -->
  <defs>
    <radialGradient id="illGlowTR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E9DCFF" stop-opacity="0.85"/>
      <stop offset="20%" stop-color="#EBDFFF" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#EEE5FF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#F1EAFF" stop-opacity="0.3"/>
      <stop offset="80%" stop-color="#F4F0FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F5F0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="illGlowBL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DBC8FF" stop-opacity="0.75"/>
      <stop offset="20%" stop-color="#DFCEFF" stop-opacity="0.62"/>
      <stop offset="40%" stop-color="#E4D6FF" stop-opacity="0.44"/>
      <stop offset="60%" stop-color="#E9DEFF" stop-opacity="0.26"/>
      <stop offset="80%" stop-color="#EDE5FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#EDE5FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="illSoften" x="-100" y="-100" width="700" height="480" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <circle cx="424" cy="60" r="165" fill="url(#illGlowTR)" filter="url(#illSoften)"/>
  <circle cx="55" cy="248" r="135" fill="url(#illGlowBL)" filter="url(#illSoften)"/>
  <circle cx="472" cy="238" r="4" fill="#D9CCFF"/>
  <circle cx="26" cy="64" r="3" fill="#B899F7"/>

  <!-- ground shadow -->
  <ellipse cx="260" cy="205" rx="210" ry="10" fill="#1E0D42" opacity="0.04"/>

  <!-- the database and its logical structures: tables, schemas, procedures -->
  <ellipse cx="110" cy="115" rx="24" ry="8.5" fill="#8355D6"/>
  <path d="M86 115V165A24 8.5 0 0 0 134 165V115" fill="#6633BB"/>
  <path d="M86 140A24 8.5 0 0 0 134 140" stroke="#FFFFFF" stroke-width="1.2" fill="none" opacity="0.3"/>
  <circle cx="130" cy="160" r="14" fill="#FFFFFF" stroke="#E4E2ED" stroke-width="1.3"/>
  <rect x="122" y="152" width="16" height="16" rx="2" stroke="#6633BB" stroke-width="1.3" fill="none"/>
  <line x1="130" y1="152" x2="130" y2="168" stroke="#6633BB" stroke-width="1.1"/>
  <line x1="122" y1="160" x2="138" y2="160" stroke="#6633BB" stroke-width="1.1"/>

  <!-- exported as a portable file -->
  <path d="M138 130Q175 118 216 122" stroke="#C4B5FD" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-dasharray="1 7"/>
  <path d="M208 115l9 7-7 10" stroke="#C4B5FD" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M220 97H274L290 113V183H220Z" fill="#FFFFFF" stroke="#E4E2ED" stroke-width="1.5"/>
  <path d="M274 97L290 113H274Z" fill="#EDE5FF"/>
  <rect x="234" y="125" width="42" height="36" rx="3" stroke="#B4AFC7" stroke-width="1.3" fill="none"/>
  <line x1="248" y1="125" x2="248" y2="161" stroke="#B4AFC7" stroke-width="1.2"/>
  <line x1="262" y1="125" x2="262" y2="161" stroke="#B4AFC7" stroke-width="1.2"/>
  <line x1="234" y1="137" x2="276" y2="137" stroke="#B4AFC7" stroke-width="1.2"/>
  <line x1="234" y1="149" x2="276" y2="149" stroke="#B4AFC7" stroke-width="1.2"/>
  <rect x="234" y="167" width="30" height="5" rx="2.5" fill="#8B5CF6"/>
  <rect x="234" y="176" width="22" height="5" rx="2.5" fill="#E4E2ED"/>

  <circle cx="290" cy="180" r="16" fill="#6633BB"/>
  <path d="M283 187v-9h9" stroke="#FFFFFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M283 187l10-10" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M289 177h4v4" stroke="#FFFFFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- relocated to another environment -->
  <path d="M306 178Q345 175 383 148" stroke="#C4B5FD" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-dasharray="1 7"/>
  <path d="M375 143l9 6-6 10" stroke="#C4B5FD" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M410 114L432.52 127V153L410 166L387.48 153V127Z" fill="#A78BFA"/>
  <circle cx="402" cy="133" r="3.5" fill="#FFFFFF"/>
  <circle cx="418" cy="133" r="3.5" fill="#FFFFFF"/>
  <circle cx="410" cy="146" r="3.5" fill="#FFFFFF"/>
  <line x1="402" y1="133" x2="418" y2="133" stroke="#FFFFFF" stroke-width="1.2"/>
  <line x1="402" y1="133" x2="410" y2="146" stroke="#FFFFFF" stroke-width="1.2"/>
  <line x1="418" y1="133" x2="410" y2="146" stroke="#FFFFFF" stroke-width="1.2"/>

  <!-- sparkle accents -->
  <path d="M460 90l1.4 4.6 4.6 1.4-4.6 1.4-1.4 4.6-1.4-4.6-4.6-1.4 4.6-1.4Z" fill="#C4B5FD"/>
  <path d="M30 190l1 3.2 3.2 1-3.2 1-1 3.2-1-3.2-3.2-1 3.2-1Z" fill="#D9CCFF"/>
</svg>
