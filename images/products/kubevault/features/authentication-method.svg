<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" fill="none" role="img" aria-label="Authentication Method">
  <defs>
    <radialGradient id="kvGlowTR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CFE0FB" stop-opacity="0.9"/><stop offset="40%" stop-color="#DCE8FD" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#EAF1FE" stop-opacity="0.14"/><stop offset="100%" stop-color="#EAF1FE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kvGlowBL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BFD6FA" stop-opacity="0.85"/><stop offset="40%" stop-color="#D3E1FC" stop-opacity="0.45"/>
      <stop offset="75%" stop-color="#E6EFFE" stop-opacity="0.12"/><stop offset="100%" stop-color="#E6EFFE" stop-opacity="0"/>
    </radialGradient>
    <filter id="kvSoften" x="-120" y="-120" width="720" height="620" filterUnits="userSpaceOnUse"><feGaussianBlur stdDeviation="22"/></filter>
    <radialGradient id="spotWhite" cx="52%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/><stop offset="62%" stop-color="#FFFFFF" stop-opacity="0.22"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="portal" x1="0.2" y1="0" x2="0.6" y2="1"><stop offset="0%" stop-color="#6EA0F9"/><stop offset="100%" stop-color="#254FAC"/></linearGradient>
    <radialGradient id="portalGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#4C84F1" stop-opacity="0.5"/><stop offset="100%" stop-color="#4C84F1" stop-opacity="0"/></radialGradient>
    <linearGradient id="chipG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#EDF3FD"/></linearGradient>
    <linearGradient id="keyGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFD463"/><stop offset="100%" stop-color="#E39A00"/></linearGradient>
    <filter id="dropBig" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#14337A" flood-opacity="0.30"/></filter>
    <filter id="dropSm" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#14337A" flood-opacity="0.26"/></filter>
  </defs>

  <circle cx="402" cy="46" r="188" fill="url(#kvGlowTR)" filter="url(#kvSoften)"/>
  <circle cx="52" cy="322" r="150" fill="url(#kvGlowBL)" filter="url(#kvSoften)"/>
  <circle cx="420" cy="300" r="4" fill="#BFD6FA"/><circle cx="34" cy="66" r="3" fill="#8FB4F2"/>
  <ellipse cx="250" cy="188" rx="188" ry="150" fill="url(#spotWhite)"/>

  <!-- converging connectors -->
  <g stroke="#9DBBF0" stroke-width="2.6" stroke-dasharray="1 7" stroke-linecap="round" fill="none">
    <path d="M138 108 C210 120 250 150 300 172"/><path d="M108 182 C180 182 230 182 288 182"/>
    <path d="M138 260 C210 246 250 214 300 194"/><path d="M244 96 C270 120 285 140 300 160"/>
  </g>

  <!-- central auth portal -->
  <g transform="translate(330 182)">
    <circle r="60" fill="url(#portalGlow)"/>
    <g filter="url(#dropBig)"><circle r="52" fill="#FFFFFF"/></g>
    <circle r="52" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="1.5"/>
    <g filter="url(#dropSm)"><path d="M0 -30 L26 -20 V4 C26 22 15 34 0 40 C-15 34 -26 22 -26 4 V-20 Z" fill="url(#portal)"/></g>
    <path d="M0 -30 L26 -20 V-8 C15 -15 -3 -15 -16 -8 L-22 -14 V-20 Z" fill="#FFFFFF" opacity="0.16"/>
    <rect x="-9" y="-2" width="18" height="15" rx="3" fill="#FFFFFF"/>
    <path d="M-6 -2 v-5 a6 6 0 0 1 12 0 v5" fill="none" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="0" cy="5" r="2.5" fill="#254FAC"/>
    <circle cx="20" cy="26" r="13" fill="#22C55E" stroke="#FFFFFF" stroke-width="2.5"/>
    <path d="M14 26 l4 4 l8 -9" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- method chips -->
  <g transform="translate(112 108)">
    <g filter="url(#dropSm)"><rect x="-26" y="-26" width="52" height="52" rx="15" fill="url(#chipG)"/></g>
    <g fill="none" stroke="#2A5FCF" stroke-width="2.4" stroke-linecap="round">
      <path d="M-12 2 a12 14 0 0 1 24 0"/><path d="M-7 4 a7 9 0 0 1 14 0 v6"/><path d="M0 4 v10"/><path d="M-12 12 v2"/><path d="M12 10 v3"/>
    </g>
  </g>
  <g transform="translate(82 182)">
    <g filter="url(#dropSm)"><rect x="-26" y="-26" width="52" height="52" rx="15" fill="url(#chipG)"/></g>
    <polygon points="0,-16 14,-8 14,8 0,16 -14,8 -14,-8" fill="none" stroke="#2A5FCF" stroke-width="2.4"/>
    <circle r="5.5" fill="none" stroke="#2A5FCF" stroke-width="2.4"/><line x1="0" y1="-5" x2="0" y2="-11" stroke="#2A5FCF" stroke-width="2.4"/>
  </g>
  <g transform="translate(112 256)">
    <g filter="url(#dropSm)"><rect x="-26" y="-26" width="52" height="52" rx="15" fill="url(#chipG)"/></g>
    <circle cx="-6" cy="-4" r="8" fill="none" stroke="url(#keyGrad)" stroke-width="4"/>
    <rect x="0" y="-6" width="20" height="4.5" rx="2" fill="url(#keyGrad)"/><rect x="14" y="-1.5" width="4.5" height="8" rx="1.5" fill="url(#keyGrad)"/>
  </g>
  <g transform="translate(244 92)">
    <g filter="url(#dropSm)"><rect x="-26" y="-24" width="52" height="48" rx="15" fill="url(#chipG)"/></g>
    <g fill="#4C84F1"><circle cx="-8" cy="4" r="8"/><circle cx="4" cy="-3" r="11"/><circle cx="15" cy="5" r="7"/><rect x="-8" y="4" width="23" height="9" rx="4.5"/></g>
  </g>
</svg>
