<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" fill="none" role="img" aria-label="Vault Backup and Restore">
  <defs>
    <radialGradient id="kvGlowTR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CFE0FB" stop-opacity="0.9"/><stop offset="40%" stop-color="#DCE8FD" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#EAF1FE" stop-opacity="0.14"/><stop offset="100%" stop-color="#EAF1FE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kvGlowBL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BFD6FA" stop-opacity="0.85"/><stop offset="40%" stop-color="#D3E1FC" stop-opacity="0.45"/>
      <stop offset="75%" stop-color="#E6EFFE" stop-opacity="0.12"/><stop offset="100%" stop-color="#E6EFFE" stop-opacity="0"/>
    </radialGradient>
    <filter id="kvSoften" x="-120" y="-120" width="720" height="620" filterUnits="userSpaceOnUse"><feGaussianBlur stdDeviation="22"/></filter>
    <radialGradient id="spotWhite" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/><stop offset="62%" stop-color="#FFFFFF" stop-opacity="0.25"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vframe" x1="0.2" y1="0" x2="0.6" y2="1"><stop offset="0%" stop-color="#4C7CE8"/><stop offset="100%" stop-color="#173A82"/></linearGradient>
    <linearGradient id="vface" x1="0.15" y1="0" x2="0.55" y2="1"><stop offset="0%" stop-color="#6EA0F9"/><stop offset="50%" stop-color="#3F73E4"/><stop offset="100%" stop-color="#254FAC"/></linearGradient>
    <linearGradient id="vsheen" x1="0" y1="0" x2="0.8" y2="1"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/><stop offset="30%" stop-color="#FFFFFF" stop-opacity="0"/></linearGradient>
    <linearGradient id="vdoor" x1="0.1" y1="0" x2="0.4" y2="1"><stop offset="0%" stop-color="#CBDCF7"/><stop offset="34%" stop-color="#E9F1FE"/><stop offset="100%" stop-color="#FAFCFF"/></linearGradient>
    <linearGradient id="cyl" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2A5FCF"/><stop offset="42%" stop-color="#5488F3"/><stop offset="100%" stop-color="#2149A8"/></linearGradient>
    <linearGradient id="cylTop" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6EA0F9"/><stop offset="100%" stop-color="#8FB6FA"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FBC63F"/><stop offset="100%" stop-color="#E9930A"/></linearGradient>
    <linearGradient id="blueA" x1="1" y1="0" x2="0" y2="0"><stop offset="0%" stop-color="#4C84F1"/><stop offset="100%" stop-color="#2A5FCF"/></linearGradient>
    <filter id="dropBig" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#14337A" flood-opacity="0.34"/></filter>
    <filter id="dropSm" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#14337A" flood-opacity="0.3"/></filter>
    <filter id="blurS" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <circle cx="402" cy="46" r="188" fill="url(#kvGlowTR)" filter="url(#kvSoften)"/>
  <circle cx="52" cy="322" r="150" fill="url(#kvGlowBL)" filter="url(#kvSoften)"/>
  <circle cx="420" cy="300" r="4" fill="#BFD6FA"/><circle cx="34" cy="66" r="3" fill="#8FB4F2"/>
  <ellipse cx="230" cy="196" rx="176" ry="150" fill="url(#spotWhite)"/>

  <!-- compact vault (beveled) left -->
  <ellipse cx="126" cy="286" rx="66" ry="12" fill="#1A3E92" opacity="0.20" filter="url(#blurS)"/>
  <g filter="url(#dropBig)">
    <rect x="76" y="272" width="16" height="14" rx="3" fill="#12306E"/><rect x="160" y="272" width="16" height="14" rx="3" fill="#12306E"/>
    <rect x="64" y="142" width="124" height="134" rx="18" fill="url(#vframe)"/>
    <rect x="71" y="149" width="110" height="120" rx="13" fill="url(#vface)"/>
    <rect x="71" y="149" width="110" height="120" rx="13" fill="url(#vsheen)"/>
  </g>
  <rect x="82" y="160" width="88" height="98" rx="10" fill="url(#vdoor)" filter="url(#dropSm)"/>
  <circle cx="126" cy="209" r="27" fill="#F3F8FF" stroke="#B7CCEE" stroke-width="2"/>
  <circle cx="126" cy="209" r="18" fill="none" stroke="#3F73E4" stroke-width="4.5"/>
  <path d="M110 194 A18 18 0 0 1 143 196" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="2.6" stroke-linecap="round"/>
  <circle cx="126" cy="209" r="6.5" fill="#2A5FCF"/>

  <!-- cloud (glossy) + database stack (right) -->
  <g filter="url(#dropSm)"><g fill="#C3D8F7"><circle cx="330" cy="112" r="20"/><circle cx="360" cy="100" r="26"/><circle cx="392" cy="114" r="19"/><rect x="330" y="112" width="62" height="22" rx="11"/></g></g>
  <g filter="url(#dropBig)">
    <ellipse cx="357" cy="292" rx="50" ry="13" fill="#1A3E92" opacity="0.18"/>
    <path d="M309 198 v72 a48 15 0 0 0 96 0 v-72 Z" fill="url(#cyl)"/>
    <ellipse cx="357" cy="234" rx="48" ry="14" fill="#2149A8"/>
    <ellipse cx="357" cy="198" rx="48" ry="15" fill="url(#cylTop)"/>
    <ellipse cx="357" cy="198" rx="48" ry="15" fill="none" stroke="#A9CBFB" stroke-opacity="0.5" stroke-width="1"/>
    <circle cx="357" cy="198" r="6" fill="#EAF1FE"/>
  </g>
  <path d="M317 205 v66" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="6" stroke-linecap="round"/>

  <!-- backup arrow (out, amber) -->
  <path d="M192 176 C236 152 262 148 296 156" fill="none" stroke="url(#amber)" stroke-width="5" stroke-linecap="round"/>
  <polygon points="302,158 285,148 287,166" fill="#E9930A"/>
  <!-- restore arrow (back, blue) -->
  <path d="M300 222 C262 236 236 246 194 246" fill="none" stroke="url(#blueA)" stroke-width="5" stroke-linecap="round"/>
  <polygon points="188,246 205,237 204,255" fill="#2A5FCF"/>

  <!-- scheduled clock badge -->
  <g transform="translate(232 92)" filter="url(#dropSm)"><circle r="20" fill="#FFFFFF"/></g>
  <g transform="translate(232 92)">
    <circle r="20" fill="none" stroke="#E3ECFA" stroke-width="1.5"/>
    <circle r="12" fill="none" stroke="#326CE5" stroke-width="2.6"/>
    <line x1="0" y1="0" x2="0" y2="-8" stroke="#326CE5" stroke-width="2.6" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="6" y2="3" stroke="#326CE5" stroke-width="2.6" stroke-linecap="round"/>
  </g>
  <g fill="#7FB0F5"><circle cx="230" cy="128" r="2.2"/><circle cx="150" cy="110" r="2"/></g>
</svg>
