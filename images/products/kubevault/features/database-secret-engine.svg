<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" fill="none" role="img" aria-label="Database Secret Engine">
  <defs>
    <radialGradient id="kvGlowTR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CFE0FB" stop-opacity="0.9"/><stop offset="40%" stop-color="#DCE8FD" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#EAF1FE" stop-opacity="0.14"/><stop offset="100%" stop-color="#EAF1FE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kvGlowBL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BFD6FA" stop-opacity="0.85"/><stop offset="40%" stop-color="#D3E1FC" stop-opacity="0.45"/>
      <stop offset="75%" stop-color="#E6EFFE" stop-opacity="0.12"/><stop offset="100%" stop-color="#E6EFFE" stop-opacity="0"/>
    </radialGradient>
    <filter id="kvSoften" x="-120" y="-120" width="720" height="620" filterUnits="userSpaceOnUse"><feGaussianBlur stdDeviation="22"/></filter>
    <radialGradient id="spotWhite" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/><stop offset="62%" stop-color="#FFFFFF" stop-opacity="0.25"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyl" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2A5FCF"/><stop offset="42%" stop-color="#5488F3"/><stop offset="100%" stop-color="#2149A8"/></linearGradient>
    <linearGradient id="cylTop" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6EA0F9"/><stop offset="100%" stop-color="#8FB6FA"/></linearGradient>
    <linearGradient id="cardG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#EDF3FD"/></linearGradient>
    <linearGradient id="keyGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFD463"/><stop offset="100%" stop-color="#E39A00"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FBC63F"/><stop offset="100%" stop-color="#E9930A"/></linearGradient>
    <filter id="dropBig" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#14337A" flood-opacity="0.30"/></filter>
    <filter id="dropSm" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#14337A" flood-opacity="0.26"/></filter>
  </defs>

  <circle cx="402" cy="46" r="188" fill="url(#kvGlowTR)" filter="url(#kvSoften)"/>
  <circle cx="52" cy="322" r="150" fill="url(#kvGlowBL)" filter="url(#kvSoften)"/>
  <circle cx="420" cy="300" r="4" fill="#BFD6FA"/><circle cx="34" cy="66" r="3" fill="#8FB4F2"/>
  <ellipse cx="230" cy="192" rx="184" ry="150" fill="url(#spotWhite)"/>

  <!-- database cylinder (3D) left -->
  <g filter="url(#dropBig)">
    <ellipse cx="120" cy="292" rx="52" ry="12" fill="#1A3E92" opacity="0.16"/>
    <path d="M72 130 v116 a48 15 0 0 0 96 0 v-116 Z" fill="url(#cyl)"/>
    <ellipse cx="120" cy="246" rx="48" ry="15" fill="#2149A8"/>
    <ellipse cx="120" cy="205" rx="48" ry="15" fill="#2149A8"/>
    <ellipse cx="120" cy="164" rx="48" ry="15" fill="#2149A8"/>
    <ellipse cx="120" cy="130" rx="48" ry="16" fill="url(#cylTop)"/>
    <ellipse cx="120" cy="130" rx="48" ry="16" fill="none" stroke="#A9CBFB" stroke-opacity="0.5" stroke-width="1"/>
    <g fill="#DCEAFE"><circle cx="104" cy="130" r="3.5"/><circle cx="120" cy="132" r="3.5"/><circle cx="136" cy="130" r="3.5"/></g>
  </g>
  <path d="M79 140 v96" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="6" stroke-linecap="round"/>

  <!-- generation arrow -->
  <path d="M172 178 C210 166 232 162 262 168" fill="none" stroke="url(#amber)" stroke-width="5" stroke-linecap="round"/>
  <polygon points="268,169 250,159 252,177" fill="#E9930A"/>

  <!-- dynamic credential cards (stacked) -->
  <g transform="translate(280 128)">
    <rect x="18" y="10" width="150" height="98" rx="14" fill="#CBDCF7"/>
    <g filter="url(#dropBig)"><rect x="0" y="0" width="152" height="100" rx="14" fill="url(#cardG)"/></g>
    <rect x="0.5" y="0.5" width="151" height="99" rx="13.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="1"/>
    <g transform="translate(28 30)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="url(#keyGrad)" stroke-width="5"/>
      <rect x="8" y="-2.5" width="24" height="5" rx="2.5" fill="url(#keyGrad)"/><rect x="26" y="2.5" width="5" height="8" rx="1.5" fill="url(#keyGrad)"/>
    </g>
    <rect x="52" y="24" width="82" height="8" rx="4" fill="#D6E4FB"/><rect x="52" y="40" width="60" height="8" rx="4" fill="#E9F1FD"/>
    <g transform="translate(30 74)">
      <circle r="12" fill="none" stroke="#326CE5" stroke-width="2.6"/>
      <line x1="0" y1="0" x2="0" y2="-7" stroke="#326CE5" stroke-width="2.6" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="5" y2="3" stroke="#326CE5" stroke-width="2.6" stroke-linecap="round"/>
    </g>
    <text x="52" y="80" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#5B7391">short-lived TTL</text>
  </g>
  <g fill="#7FB0F5"><circle cx="230" cy="120" r="2.4"/><circle cx="330" cy="250" r="2"/></g>
</svg>
