<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" fill="none" role="img" aria-label="GCP Secret Engine">
  <defs>
    <radialGradient id="kvGlowTR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CFE0FB" stop-opacity="0.9"/><stop offset="40%" stop-color="#DCE8FD" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#EAF1FE" stop-opacity="0.14"/><stop offset="100%" stop-color="#EAF1FE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kvGlowBL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BFD6FA" stop-opacity="0.85"/><stop offset="40%" stop-color="#D3E1FC" stop-opacity="0.45"/>
      <stop offset="75%" stop-color="#E6EFFE" stop-opacity="0.12"/><stop offset="100%" stop-color="#E6EFFE" stop-opacity="0"/>
    </radialGradient>
    <filter id="kvSoften" x="-120" y="-120" width="720" height="620" filterUnits="userSpaceOnUse"><feGaussianBlur stdDeviation="22"/></filter>
    <radialGradient id="spotWhite" cx="50%" cy="46%" r="55%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/><stop offset="62%" stop-color="#FFFFFF" stop-opacity="0.24"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
    <radialGradient id="brandGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#4285F4" stop-opacity="0.34"/><stop offset="100%" stop-color="#4285F4" stop-opacity="0"/></radialGradient>
    <linearGradient id="cardG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#EDF3FD"/></linearGradient>
    <linearGradient id="keyGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFD463"/><stop offset="100%" stop-color="#E39A00"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FBC63F"/><stop offset="100%" stop-color="#E9930A"/></linearGradient>
    <filter id="dropBig" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#14337A" flood-opacity="0.28"/></filter>
    <filter id="dropSm" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#14337A" flood-opacity="0.26"/></filter>
  </defs>

  <circle cx="402" cy="46" r="188" fill="url(#kvGlowTR)" filter="url(#kvSoften)"/>
  <circle cx="52" cy="322" r="150" fill="url(#kvGlowBL)" filter="url(#kvSoften)"/>
  <circle cx="420" cy="300" r="4" fill="#BFD6FA"/><circle cx="34" cy="66" r="3" fill="#8FB4F2"/>
  <ellipse cx="230" cy="188" rx="186" ry="146" fill="url(#spotWhite)"/>

  <!-- provider card: Google Cloud -->
  <g transform="translate(118 180)">
    <ellipse cx="0" cy="-16" rx="52" ry="46" fill="url(#brandGlow)"/>
    <g filter="url(#dropBig)"><rect x="-70" y="-64" width="140" height="128" rx="20" fill="url(#cardG)"/></g>
    <rect x="-69.5" y="-63.5" width="139" height="127" rx="19.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="1"/>
    <g transform="translate(-2 -16)">
      <clipPath id="gcpClip"><path d="M-30 13 a15 15 0 0 1 -1 -28 a19 19 0 0 1 36 -4 a13 13 0 0 1 22 6 a13 13 0 0 1 -4 26 Z"/></clipPath>
      <g clip-path="url(#gcpClip)">
        <rect x="-46" y="-36" width="46" height="36" fill="#EA4335"/><rect x="0" y="-36" width="50" height="36" fill="#FBBC05"/>
        <rect x="0" y="0" width="50" height="36" fill="#34A853"/><rect x="-46" y="0" width="46" height="36" fill="#4285F4"/>
      </g>
      <path d="M-30 13 a15 15 0 0 1 -1 -28 a19 19 0 0 1 36 -4 a13 13 0 0 1 22 6 a4 4 0 0 1 0 2 a13 13 0 0 0 -20 -8 a19 19 0 0 0 -34 4 a15 15 0 0 0 -3 26 Z" fill="#FFFFFF" opacity="0.3"/>
    </g>
    <text x="0" y="46" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="#4285F4" text-anchor="middle">GCP</text>
  </g>

  <path d="M192 180 C222 170 240 168 262 174" fill="none" stroke="url(#amber)" stroke-width="5" stroke-linecap="round"/>
  <polygon points="268,175 250,165 252,183" fill="#E9930A"/>

  <!-- dynamic credential card -->
  <g transform="translate(280 128)">
    <rect x="16" y="10" width="140" height="100" rx="14" fill="#CBDCF7"/>
    <g filter="url(#dropBig)"><rect x="0" y="0" width="140" height="100" rx="14" fill="url(#cardG)"/></g>
    <rect x="0.5" y="0.5" width="139" height="99" rx="13.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="1"/>
    <g transform="translate(26 30)"><circle cx="0" cy="0" r="10" fill="none" stroke="url(#keyGrad)" stroke-width="5"/><rect x="8" y="-2.5" width="24" height="5" rx="2.5" fill="url(#keyGrad)"/><rect x="26" y="2.5" width="5" height="8" rx="1.5" fill="url(#keyGrad)"/></g>
    <rect x="50" y="24" width="76" height="8" rx="4" fill="#D6E4FB"/><rect x="50" y="40" width="54" height="8" rx="4" fill="#E9F1FD"/>
    <g transform="translate(30 74)" stroke="#326CE5" stroke-width="2.6" fill="none" stroke-linecap="round"><path d="M-9 -3 A 9 9 0 1 1 -9 6"/><polygon points="-9,-8 -4,-3 -11,0" fill="#326CE5" stroke="none"/></g>
    <text x="50" y="80" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600" fill="#5B7391">dynamic</text>
  </g>
  <g fill="#7FB0F5"><circle cx="230" cy="118" r="2.4"/></g>
</svg>
