<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" fill="none" role="img" aria-label="Auto Initialization and Unsealing">
  <defs>
    <radialGradient id="kvGlowTR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CFE0FB" stop-opacity="0.9"/><stop offset="40%" stop-color="#DCE8FD" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#EAF1FE" stop-opacity="0.14"/><stop offset="100%" stop-color="#EAF1FE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kvGlowBL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BFD6FA" stop-opacity="0.85"/><stop offset="40%" stop-color="#D3E1FC" stop-opacity="0.45"/>
      <stop offset="75%" stop-color="#E6EFFE" stop-opacity="0.12"/><stop offset="100%" stop-color="#E6EFFE" stop-opacity="0"/>
    </radialGradient>
    <filter id="kvSoften" x="-120" y="-120" width="720" height="620" filterUnits="userSpaceOnUse"><feGaussianBlur stdDeviation="22"/></filter>
    <radialGradient id="spotWhite" cx="50%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/><stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.28"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vframe" x1="0.2" y1="0" x2="0.6" y2="1"><stop offset="0%" stop-color="#4C7CE8"/><stop offset="100%" stop-color="#173A82"/></linearGradient>
    <linearGradient id="vface" x1="0.15" y1="0" x2="0.55" y2="1"><stop offset="0%" stop-color="#6EA0F9"/><stop offset="50%" stop-color="#3F73E4"/><stop offset="100%" stop-color="#254FAC"/></linearGradient>
    <linearGradient id="vsheen" x1="0" y1="0" x2="0.8" y2="1"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/><stop offset="30%" stop-color="#FFFFFF" stop-opacity="0"/></linearGradient>
    <linearGradient id="vdoor" x1="0.1" y1="0" x2="0.4" y2="1"><stop offset="0%" stop-color="#CBDCF7"/><stop offset="34%" stop-color="#E9F1FE"/><stop offset="100%" stop-color="#FAFCFF"/></linearGradient>
    <linearGradient id="keyGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFD463"/><stop offset="100%" stop-color="#E39A00"/></linearGradient>
    <radialGradient id="keyGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FBC63F" stop-opacity="0.75"/><stop offset="100%" stop-color="#FBC63F" stop-opacity="0"/></radialGradient>
    <radialGradient id="grnGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#22C55E" stop-opacity="0.5"/><stop offset="100%" stop-color="#22C55E" stop-opacity="0"/></radialGradient>
    <linearGradient id="gear" x1="0.2" y1="0" x2="0.7" y2="1"><stop offset="0%" stop-color="#C7DBFA"/><stop offset="100%" stop-color="#8FB3EC"/></linearGradient>
    <linearGradient id="cardG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#EEF4FD"/></linearGradient>
    <filter id="dropBig" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#14337A" flood-opacity="0.34"/></filter>
    <filter id="dropSm" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#14337A" flood-opacity="0.3"/></filter>
    <filter id="blurS" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <!-- background -->
  <circle cx="402" cy="46" r="188" fill="url(#kvGlowTR)" filter="url(#kvSoften)"/>
  <circle cx="52" cy="322" r="150" fill="url(#kvGlowBL)" filter="url(#kvSoften)"/>
  <circle cx="420" cy="300" r="4" fill="#BFD6FA"/><circle cx="34" cy="66" r="3" fill="#8FB4F2"/>
  <ellipse cx="232" cy="196" rx="168" ry="150" fill="url(#spotWhite)"/>

  <!-- cloud KMS provider card -->
  <g filter="url(#dropSm)"><rect x="40" y="52" width="128" height="52" rx="16" fill="url(#cardG)"/></g>
  <rect x="40.5" y="52.5" width="127" height="51" rx="15.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="1"/>
  <g transform="translate(70 78)"><path d="M-16 12 a13 13 0 0 1 2 -25 a17 17 0 0 1 33 4 a11 11 0 0 1 -2 21 Z" fill="#9DBBF0"/></g>
  <circle cx="112" cy="78" r="4" fill="#22C55E"/><circle cx="128" cy="78" r="4" fill="#FBC63F"/><circle cx="144" cy="78" r="4" fill="#4C84F1"/>
  <path d="M104 104 C150 138 168 148 196 172" stroke="#9DBBF0" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="1 9"/>

  <!-- automation gear -->
  <g transform="translate(362 98)">
    <circle r="42" fill="url(#grnGlow)"/>
    <g filter="url(#dropSm)">
      <g fill="url(#gear)">
        <circle r="33"/>
        <g>
          <rect x="-6" y="-45" width="12" height="14" rx="2"/><rect x="-6" y="31" width="12" height="14" rx="2"/>
          <rect x="-45" y="-6" width="14" height="12" rx="2"/><rect x="31" y="-6" width="14" height="12" rx="2"/>
          <rect x="-6" y="-45" width="12" height="14" rx="2" transform="rotate(45)"/><rect x="-6" y="31" width="12" height="14" rx="2" transform="rotate(45)"/>
          <rect x="-45" y="-6" width="14" height="12" rx="2" transform="rotate(45)"/><rect x="31" y="-6" width="14" height="12" rx="2" transform="rotate(45)"/>
        </g>
      </g>
    </g>
    <circle r="16" fill="#FFFFFF"/>
    <path d="M-7 0 l5 6 l9 -11" fill="none" stroke="#16A34A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- vault (beveled) with open door + glowing interior -->
  <ellipse cx="232" cy="300" rx="92" ry="15" fill="#1A3E92" opacity="0.20" filter="url(#blurS)"/>
  <g filter="url(#dropBig)">
    <rect x="162" y="284" width="20" height="16" rx="4" fill="#12306E"/><rect x="278" y="284" width="20" height="16" rx="4" fill="#12306E"/>
    <rect x="150" y="118" width="156" height="166" rx="22" fill="url(#vframe)"/>
    <rect x="158" y="126" width="140" height="150" rx="16" fill="url(#vface)"/>
    <rect x="158" y="126" width="140" height="150" rx="16" fill="url(#vsheen)"/>
  </g>
  <!-- inner cavity -->
  <rect x="172" y="140" width="112" height="122" rx="12" fill="#132C63"/>
  <rect x="172" y="140" width="112" height="122" rx="12" fill="none" stroke="#0E2251" stroke-width="2"/>
  <!-- glowing secret token inside -->
  <circle cx="214" cy="201" r="26" fill="url(#keyGlow)"/>
  <circle cx="214" cy="201" r="11" fill="url(#keyGrad)"/><circle cx="211" cy="198" r="3" fill="#FFE6A8"/>
  <!-- open door swung right -->
  <g transform="translate(286 140)" filter="url(#dropSm)">
    <g transform="skewY(-13)">
      <rect x="0" y="0" width="104" height="122" rx="12" fill="url(#vdoor)"/>
      <rect x="0.5" y="0.5" width="103" height="121" rx="11.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="1"/>
      <circle cx="64" cy="52" r="19" fill="#F3F8FF" stroke="#B7CCEE" stroke-width="2"/>
      <path d="M50 40 A19 19 0 0 1 78 42" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="64" cy="52" r="6" fill="#2A5FCF"/>
    </g>
  </g>

  <!-- unseal key turning into the lock -->
  <g transform="translate(196 206)">
    <circle cx="0" cy="0" r="20" fill="url(#keyGlow)"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="url(#keyGrad)" stroke-width="7"/>
    <rect x="11" y="-3.5" width="46" height="7" rx="3.5" fill="url(#keyGrad)"/>
    <rect x="45" y="3.5" width="7" height="12" rx="2" fill="url(#keyGrad)"/><rect x="34" y="3.5" width="6" height="9" rx="2" fill="url(#keyGrad)"/>
  </g>
  <g fill="#7FB0F5"><circle cx="330" cy="150" r="2.4"/><circle cx="150" cy="120" r="2"/></g>
</svg>
