<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" fill="none" role="img" aria-label="Manage DB Users Privileges">
  <defs>
    <radialGradient id="kvGlowTR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CFE0FB" stop-opacity="0.9"/><stop offset="40%" stop-color="#DCE8FD" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#EAF1FE" stop-opacity="0.14"/><stop offset="100%" stop-color="#EAF1FE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kvGlowBL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#BFD6FA" stop-opacity="0.85"/><stop offset="40%" stop-color="#D3E1FC" stop-opacity="0.45"/>
      <stop offset="75%" stop-color="#E6EFFE" stop-opacity="0.12"/><stop offset="100%" stop-color="#E6EFFE" stop-opacity="0"/>
    </radialGradient>
    <filter id="kvSoften" x="-120" y="-120" width="720" height="620" filterUnits="userSpaceOnUse"><feGaussianBlur stdDeviation="22"/></filter>
    <radialGradient id="spotWhite" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/><stop offset="62%" stop-color="#FFFFFF" stop-opacity="0.25"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyl" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2A5FCF"/><stop offset="42%" stop-color="#5488F3"/><stop offset="100%" stop-color="#2149A8"/></linearGradient>
    <linearGradient id="cylTop" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#6EA0F9"/><stop offset="100%" stop-color="#8FB6FA"/></linearGradient>
    <linearGradient id="cardG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#EDF3FD"/></linearGradient>
    <linearGradient id="shield" x1="0.2" y1="0" x2="0.6" y2="1"><stop offset="0%" stop-color="#6EA0F9"/><stop offset="100%" stop-color="#254FAC"/></linearGradient>
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#4C84F1" stop-opacity="0.45"/><stop offset="100%" stop-color="#4C84F1" stop-opacity="0"/></radialGradient>
    <linearGradient id="keyGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFD463"/><stop offset="100%" stop-color="#E39A00"/></linearGradient>
    <linearGradient id="avatar" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8FB3EC"/><stop offset="100%" stop-color="#6E92D8"/></linearGradient>
    <filter id="dropBig" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#14337A" flood-opacity="0.32"/></filter>
    <filter id="dropSm" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#14337A" flood-opacity="0.28"/></filter>
    <filter id="blurS" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <circle cx="402" cy="46" r="188" fill="url(#kvGlowTR)" filter="url(#kvSoften)"/>
  <circle cx="52" cy="322" r="150" fill="url(#kvGlowBL)" filter="url(#kvSoften)"/>
  <circle cx="420" cy="300" r="4" fill="#BFD6FA"/><circle cx="34" cy="66" r="3" fill="#8FB4F2"/>
  <ellipse cx="228" cy="192" rx="182" ry="150" fill="url(#spotWhite)"/>

  <!-- database cylinder (3D) left -->
  <g filter="url(#dropBig)">
    <ellipse cx="130" cy="292" rx="56" ry="12" fill="#1A3E92" opacity="0.16"/>
    <path d="M78 118 v124 a52 17 0 0 0 104 0 v-124 Z" fill="url(#cyl)"/>
    <ellipse cx="130" cy="242" rx="52" ry="16" fill="#2149A8"/>
    <ellipse cx="130" cy="200" rx="52" ry="16" fill="#2149A8"/>
    <ellipse cx="130" cy="158" rx="52" ry="16" fill="#2149A8"/>
    <ellipse cx="130" cy="118" rx="52" ry="17" fill="url(#cylTop)"/>
    <ellipse cx="130" cy="118" rx="52" ry="17" fill="none" stroke="#A9CBFB" stroke-opacity="0.5" stroke-width="1"/>
    <g fill="#DCEAFE"><circle cx="112" cy="118" r="4"/><circle cx="130" cy="120" r="4"/><circle cx="148" cy="118" r="4"/></g>
  </g>
  <path d="M86 128 v104" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="7" stroke-linecap="round"/>

  <!-- user avatar card (right) -->
  <g filter="url(#dropBig)"><circle cx="346" cy="150" r="46" fill="url(#cardG)"/></g>
  <circle cx="346" cy="150" r="46" fill="none" stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="1.5"/>
  <circle cx="346" cy="138" r="16" fill="url(#avatar)"/>
  <path d="M320 180 a26 24 0 0 1 52 0 Z" fill="url(#avatar)"/>

  <!-- access shield (center) -->
  <g transform="translate(238 158)">
    <ellipse cx="0" cy="6" rx="40" ry="42" fill="url(#shieldGlow)"/>
    <g filter="url(#dropSm)"><path d="M0 -34 L30 -22 V4 C30 24 17 38 0 46 C-17 38 -30 24 -30 4 V-22 Z" fill="url(#shield)"/></g>
    <path d="M0 -34 L30 -22 V4 C30 24 17 38 0 46 C-17 38 -30 24 -30 4 V-22 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1.5"/>
    <path d="M0 -34 L30 -22 V-8 C18 -16 -4 -16 -18 -8 L-24 -16 V-22 Z" fill="#FFFFFF" opacity="0.16"/>
    <circle cx="-4" cy="2" r="8" fill="none" stroke="url(#keyGrad)" stroke-width="4"/>
    <rect x="2" y="0" width="20" height="4.5" rx="2" fill="url(#keyGrad)"/><rect x="16" y="4.5" width="4.5" height="7" rx="1.5" fill="url(#keyGrad)"/>
  </g>
  <line x1="184" y1="180" x2="210" y2="180" stroke="#9DBBF0" stroke-width="2.6" stroke-dasharray="1 7" stroke-linecap="round"/>
  <line x1="266" y1="172" x2="300" y2="164" stroke="#9DBBF0" stroke-width="2.6" stroke-dasharray="1 7" stroke-linecap="round"/>

  <!-- grant (check) / revoke (cross) badges -->
  <g transform="translate(322 250)">
    <g filter="url(#dropSm)"><circle r="18" fill="#22C55E"/></g>
    <circle r="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1.5"/>
    <path d="M-8 0 l5.5 5.5 l10 -11" fill="none" stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(370 250)">
    <g filter="url(#dropSm)"><circle r="18" fill="#EF4444"/></g>
    <circle r="18" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1.5"/>
    <path d="M-6 -6 l12 12 M6 -6 l-12 12" stroke="#FFFFFF" stroke-width="3.4" stroke-linecap="round"/>
  </g>
  <g fill="#7FB0F5"><circle cx="228" cy="120" r="2.4"/><circle cx="300" cy="240" r="2"/></g>
</svg>
